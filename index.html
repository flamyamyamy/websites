<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amy Portfolio</title>

    <link rel="stylesheet" href="main.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>

<nav class="nav">
    <span class="nav-logo">&gt; flamyamy portfolio</span>

    <div class="nav-links">
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#imprint">Imprint</a>
        <a href="https://github.com/flamyamyamy" target="_blank">GitHub</a>
    </div>
</nav>

<section class="hero">
    <div class="hero-content">

        <div class="hero-face-wrapper">
            <img src="https://i.imgur.com/L54eE1b.png" alt="Amy" class="hero-image">
        </div>

        <div class="hero-text">
            <h1 class="glitch">Amy</h1>

            <div class="terminal-line">
                <span class="prompt">$</span>
                <span id="typed-text"></span>
                <span class="cursor">_</span>
            </div>

            <div class="tech-badges">
                <span class="badge badge-orange">Java</span>
                <span class="badge badge-yellow">JavaScript</span>
                <span class="badge badge-blue">TypeScript</span>
                <span class="badge badge-green">Python</span>
                <span class="badge badge-purple">C#</span>
                <span class="badge badge-pink">Community Management</span>
            </div>

            <div class="hero-actions">
                <a href="https://github.com/flamyamyamy" target="_blank" class="btn btn-primary">GitHub</a>
                <a href="#projects" class="btn btn-secondary">Projects</a>
            </div>
        </div>

    </div>
</section>

<script>
const terminalTexts = [
    "19 🇦🇹 | Law Student | Developer",
    "Java • JavaScript • TypeScript",
    "Discord Bots & Web Development",
    "Building cool things",
    "Coffee powered coding machine ☕"
];

const typedText = document.getElementById("typed-text");

let textIndex = 0;
let charIndex = 0;
let deleting = false;

function typeLoop() {
    const current = terminalTexts[textIndex];

    if (!deleting) {
        typedText.textContent = current.slice(0, charIndex++);
        if (charIndex > current.length) {
            deleting = true;
            setTimeout(typeLoop, 1800);
            return;
        }
    } else {
        typedText.textContent = current.slice(0, charIndex--);
        if (charIndex < 0) {
            deleting = false;
            textIndex = (textIndex + 1) % terminalTexts.length;
        }
    }

    setTimeout(typeLoop, deleting ? 35 : 70);
}

typeLoop();
</script>

</body>
</html>
