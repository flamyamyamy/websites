<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amy.dev</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>

<nav class="nav">
    <span class="nav-logo">&gt;amy.dev</span>

    <div class="nav-links">
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="https://github.com/flamyamyamyamy" target="_blank">GitHub</a>
    </div>
</nav>

<section class="hero" id="home">
    <div class="hero-content">

        <div class="hero-face-wrapper">
            <img src="https://i.imgur.com/L54eE1b.png" alt="Amy" class="hero-image">
        </div>

        <div class="hero-text">
            <h1 class="glitch" data-text="Amy">Amy</h1>

            <div class="terminal-line">
                <span class="prompt">$</span>
                <span class="typed" id="typed-text"></span>
                <span class="cursor">_</span>
            </div>

            <div class="tech-badges">
                <span class="badge badge-orange">Java</span>
                <span class="badge badge-yellow">JavaScript</span>
                <span class="badge badge-blue">TypeScript</span>
                <span class="badge badge-green">Python</span>
                <span class="badge badge-purple">C#</span>
            </div>

            <div class="hero-actions">
                <a href="https://github.com/flamyamyamyamy" target="_blank" class="btn btn-primary">
                    GitHub
                </a>

                <a href="#projects" class="btn btn-secondary">
                    Projects
                </a>
            </div>
        </div>

    </div>


</section>


<script>
const terminalTexts = [
    "19 🇦🇹 | Law Student | Developer",
    "Java • JavaScript • TypeScript",
    "Python & C# Developer",
    "Building cool things",
    "Coffee powered coding machine ☕",
    "github.com/flamyamyamyamy"
];

const typedText = document.getElementById("typed-text");

let textIndex = 0;
let charIndex = 0;
let deleting = false;

function typeLoop() {
    const current = terminalTexts[textIndex];

    if (!deleting) {
        typedText.textContent = current.slice(0, charIndex++);
        if (charIndex > current.length) {
            deleting = true;
            setTimeout(typeLoop, 1800);
            return;
        }
    } else {
        typedText.textContent = current.slice(0, charIndex--);
        if (charIndex < 0) {
            deleting = false;
            textIndex = (textIndex + 1) % terminalTexts.length;
        }
    }

    setTimeout(typeLoop, deleting ? 35 : 70);
}

typeLoop();
</script>

</body>
</html>
